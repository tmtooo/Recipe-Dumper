plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '6.0.16'
}

def mod_id = "recipedumper"

version = "1.0.0"
group = "com.recipedumper"

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: 'official', version: '1.20.1'
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.4.13'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.register('testOwnershipMatcher', JavaExec) {
    group = 'verification'
    description = 'Runs focused behavior tests for recipe ownership matching.'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.recipedumper.RecipeOwnershipMatcherTestMain'
    dependsOn testClasses
}
